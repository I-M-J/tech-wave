<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWave</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="styles/tech-wave.css">

<body class="inter-font">
    <header>
        <div class="nav-container deep-background">
            <nav class="">
                <div class="brand">
                    <h2><span>Tech</span><span class="gradient-text">Wave</span></h2>
                </div>

                <div>
                    <ul>
                        <li><a href="" class="nav-link">About</a></li>
                        <li><a href="" class="nav-link">Episodes</a></li>
                        <li><a href="" class="nav-link">Host</a></li>
                    </ul>
                </div>

                <div>
                    <button class="sub-btn">Subscribe <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </nav>
        </div>

        <div class="hero-container">
            <div>
                <p class="hero-badge">NEW</p>
                
                <div class="hero-circle-container">
                    <img src="assets/hero-circle.png" alt="" class="hero-circle">
                </div>

                <div class="microphone-container">
                    <img src="assets/microphone.png" alt="" class="microphone">
                </div>
            </div>
            
            <div class="hero-content">
                <h1>TechWave</h1>

                <p>Your daily dose of tech insights, productivity hacks, and personal growth</p>

                <div class="hero-button">
                    <button class="sub-btn"><i class="fa-brands fa-spotify"></i> Listen On Spotify</button>

                    <button class="sub-green"><i class="fa-regular fa-envelope"></i> Subscribe</button>
                </div>
            </div>
        </div>
